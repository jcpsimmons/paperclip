name: Release Smoke

on:
  workflow_dispatch:
    inputs:
      paperclip_version:
        description: Published Paperclip dist-tag to test
        required: true
        default: canary
        type: choice
        options:
          - canary
          - latest
      host_port:
        description: Host port for the Docker smoke container
        required: false
        default: "3232"
        type: string
      artifact_name:
        description: Artifact name for uploaded diagnostics
        required: false
        default: release-smoke
        type: string
  workflow_call:
    inputs:
      paperclip_version:
        required: true
        type: string
      host_port:
        required: false
        default: "3232"
        type: string
      artifact_name:
        required: false
        default: release-smoke
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Launch Docker smoke harness
        run: |
          SMOKE_ARTIFACT_DIR="$RUNNER_TEMP/release-smoke" \
          HOST_PORT="${{ inputs.host_port }}" \
          DATA_DIR="$RUNNER_TEMP/release-smoke-data" \
          PAPERCLIPAI_VERSION="${{ inputs.paperclip_version }}" \
          ./scripts/release-smoke.sh
          {
            echo "SMOKE_METADATA_FILE=$RUNNER_TEMP/release-smoke/release-smoke.env"
          } >> "$GITHUB_ENV"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            ${{ runner.temp }}/release-smoke/
            tests/release-smoke/playwright-report/
            tests/release-smoke/test-results/
          retention-days: 14

      - name: Stop Docker smoke container
        if: always()
        run: |
          metadata_file="${SMOKE_METADATA_FILE:-$RUNNER_TEMP/release-smoke/release-smoke.env}"
          if [[ -f "$metadata_file" ]]; then
            set -a
            source "$metadata_file"
            set +a
          fi
          if [[ -n "${SMOKE_CONTAINER_NAME:-}" ]]; then
            docker rm -f "$SMOKE_CONTAINER_NAME" >/dev/null 2>&1 || true
          fi
